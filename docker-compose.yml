services:
  postgres:
    image: postgres:16-alpine
    container_name: controle-financeiro-postgres
    environment:
      POSTGRES_DB: ControleFinanceiro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - controle-financeiro-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: controle-financeiro-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=ControleFinanceiro;Username=postgres;Password=postgres
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - controle-financeiro-network
 
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: controle-financeiro-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - controle-financeiro-network

networks:
  controle-financeiro-network:
    driver: bridge

volumes:
  postgres_data:
